# GitLab CI/CD Pipeline — App Template
# Builds, tests, and pushes a container image to the GitLab registry.
# ArgoCD watches the k8s/ directory and auto-deploys on manifest changes.
#
# Required CI/CD variables (set in GitLab project settings):
#   None — CI_REGISTRY_* variables are provided automatically by GitLab.

stages:
  - lint
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  DOCKER_BUILDKIT: "1"

# -- Lint stage ---------------------------------------------------------------

lint:manifests:
  stage: lint
  image: bitnami/kubectl:latest
  script:
    - kubectl apply --dry-run=client -f k8s/ || exit 1
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -- Build stage --------------------------------------------------------------

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --cache-from $DOCKER_IMAGE_LATEST -t $DOCKER_IMAGE .
    - docker tag $DOCKER_IMAGE $DOCKER_IMAGE_LATEST
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*"
        - "!k8s/**"

build:mr:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --cache-from $DOCKER_IMAGE_LATEST -t $DOCKER_IMAGE .
  rules:
    - if: $CI_MERGE_REQUEST_ID

# -- Test stage ---------------------------------------------------------------

test:
  stage: test
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $DOCKER_IMAGE || docker build -t $DOCKER_IMAGE .
    - docker run --rm $DOCKER_IMAGE /bin/sh -c "echo 'Replace with your test command'"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "**/*"
        - "!k8s/**"

# -- Deploy stage -------------------------------------------------------------
# Updates the image tag in k8s/deployment.yaml so ArgoCD detects the change.
# Skips if the commit message starts with "ci:" to prevent infinite loops.

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache sed git
    - git config user.email "ci@${CI_SERVER_HOST}"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin ${CI_DEFAULT_BRANCH}
    - git checkout ${CI_DEFAULT_BRANCH}
  script:
    - 'sed -i "s|image: .*|image: ${DOCKER_IMAGE}|" k8s/deployment.yaml'
    - git add k8s/deployment.yaml
    - git diff --cached --quiet && echo "No image change" && exit 0
    - git commit -m "[skip ci] update image to ${CI_COMMIT_SHORT_SHA}"
    - git push origin ${CI_DEFAULT_BRANCH}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_MESSAGE !~ /^\[skip ci\]/
      changes:
        - "**/*"
        - "!k8s/**"
