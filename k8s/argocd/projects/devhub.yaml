# ArgoCD Project for devhub applications
# Defines RBAC, allowed sources, and destinations
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: devhub
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: devhub application workloads

  # Allowed source repositories
  sourceRepos:
    - '*'  # Allow all repos - restrict in production

  # Allowed destination clusters and namespaces
  destinations:
    - namespace: devhub
      server: https://kubernetes.default.svc
    - namespace: devhub-*
      server: https://kubernetes.default.svc

  # Allowed cluster-scoped resources
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace

  # Allowed namespace-scoped resource kinds
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Deny certain resources (optional security)
  # namespaceResourceBlacklist:
  #   - group: ''
  #     kind: ResourceQuota
  #   - group: ''
  #     kind: LimitRange

  # Roles for this project
  roles:
    - name: developer
      description: Developer access to devhub apps
      policies:
        - p, proj:devhub:developer, applications, get, devhub/*, allow
        - p, proj:devhub:developer, applications, sync, devhub/*, allow
      groups:
        - developers

    - name: admin
      description: Admin access to devhub apps
      policies:
        - p, proj:devhub:admin, applications, *, devhub/*, allow
      groups:
        - admins
