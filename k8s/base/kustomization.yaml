apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This is the root kustomization for platform infrastructure
# Applications are managed via ArgoCD (see argocd/apps/)
#
# Use overlays/local or overlays/upcloud for environment-specific deployments

resources:
  - devops/namespaces/namespaces.yaml

# Common labels applied to all resources
labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
