# Keycloak Helm values
# Chart: codecentric/keycloakx
# Docs: https://github.com/codecentric/helm-charts/tree/master/charts/keycloakx
#
# Domain configuration is provided by overlays:
#   - overlays/local/devops/keycloak/values.yaml
#   - overlays/upcloud/devops/keycloak/values.yaml

# Use official Keycloak image from quay.io
image:
  repository: quay.io/keycloak/keycloak
  tag: "26.0"
  pullPolicy: IfNotPresent

# Number of replicas (override in local overlay for single replica)
replicas: 2

# Command to run Keycloak (production mode)
command:
  - "/opt/keycloak/bin/kc.sh"
args:
  - "start"
  - "--hostname-strict=false"
  - "--cache=local"

# Database configuration - uses external PostgreSQL
database:
  vendor: postgres
  hostname: postgresql.data-services.svc.cluster.local
  port: 5432
  database: keycloak
  username: keycloak
  existingSecret: keycloak-db-secret
  existingSecretKey: password

# Admin credentials from secret
extraEnv: |
  - name: KEYCLOAK_ADMIN
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-secret
        key: KEYCLOAK_ADMIN
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-admin-secret
        key: KEYCLOAK_ADMIN_PASSWORD
  - name: KC_HOSTNAME
    value: "keycloak.${DOMAIN}"
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: "false"
  - name: KC_FEATURES
    value: "token-exchange,admin-fine-grained-authz"

# Proxy configuration for TLS termination at ingress
proxy:
  enabled: true
  mode: xforwarded

# Health and metrics
health:
  enabled: true

metrics:
  enabled: true

# HTTP configuration
http:
  relativePath: "/"

# Resources
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Service
service:
  type: ClusterIP
  httpPort: 80
  annotations: {}

# Ingress - domain/annotations overridden by overlays
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  rules:
    - host: keycloak.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ServiceMonitor for Prometheus
serviceMonitor:
  enabled: true
  interval: 30s

# Service account
serviceAccount:
  create: true
  name: ""
