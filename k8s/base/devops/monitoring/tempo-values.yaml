# Tempo Helm values (Single Binary)
# Chart: grafana/tempo (deprecated, use grafana/tempo-distributed for production)
# Docs: https://grafana.com/docs/tempo/latest/setup/helm-chart/

tempo:
  repository: grafana/tempo
  tag: "2.6.1"
  
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Receivers for traces
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

# Persistence
persistence:
  enabled: true
  size: 10Gi

# Metrics
serviceMonitor:
  enabled: true
