# Loki Helm values (Single Binary mode for local/small deployments)
# Chart: grafana/loki
# Docs: https://grafana.com/docs/loki/latest/installation/helm/

# Use SingleBinary mode for local development (no object storage required)
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
  
  storage:
    type: filesystem
  
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Single binary mode for simpler setup
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi

# Disable read/write/backend separation (not needed for SingleBinary)
read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

# Gateway (nginx)
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Monitoring
monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# No need for minio in single binary mode
minio:
  enabled: false
