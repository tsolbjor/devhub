# Loki Helm values (Distributed mode)
# Chart: grafana/loki
# Docs: https://grafana.com/docs/loki/latest/installation/helm/

# Deploy in simple scalable mode (good for medium workloads)
deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 2
  
  storage:
    type: filesystem
  
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Single binary mode for simpler setup (alternative to SimpleScalable)
# singleBinary:
#   replicas: 1

# Read path
read:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Write path
write:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 20Gi

# Backend (compactor, index-gateway, ruler)
backend:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 20Gi

# Gateway (nginx)
gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Monitoring
monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# No need for minio in simple mode with filesystem storage
minio:
  enabled: false

# Promtail for log collection
# Install separately or use Grafana Alloy
