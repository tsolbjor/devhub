# GitLab local overlay values
# Merged with base/devops/gitlab/values.yaml
# Uses ${DOMAIN} and ${TLS_SECRET_NAME} from config.yaml

global:
  hosts:
    domain: ${DOMAIN}
    gitlab:
      name: gitlab.${DOMAIN}
    registry:
      name: registry.${DOMAIN}
    minio:
      name: minio.${DOMAIN}
  
  ingress:
    annotations: {}
    configureCertmanager: false
    tls:
      enabled: true
      secretName: ${TLS_SECRET_NAME}

# Disable GitLab Runner for local - needs DNS resolution to gitlab.local.dev
# Enable in production or after setting up external-dns / CoreDNS customization
gitlab-runner:
  install: false
