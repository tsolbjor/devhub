# Vault local overlay values
# Merged with base/devops/vault/values.yaml
# Uses ${DOMAIN} and ${TLS_SECRET_NAME} from config.yaml

server:
  # Single replica for local development
  ha:
    enabled: true
    replicas: 1
    
  ingress:
    hosts:
      - host: vault.${DOMAIN}
        paths: []
    annotations: {}
    tls:
      - secretName: ${TLS_SECRET_NAME}
        hosts:
          - vault.${DOMAIN}

# Single injector replica for local
injector:
  replicas: 1
