# Monitoring local overlay values
# Merged with base/devops/monitoring/prometheus-stack-values.yaml
# Uses ${DOMAIN} and ${TLS_SECRET_NAME} from config.yaml

prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.${DOMAIN}
    tls:
      - secretName: ${TLS_SECRET_NAME}
        hosts:
          - prometheus.${DOMAIN}

alertmanager:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - alertmanager.${DOMAIN}
    tls:
      - secretName: ${TLS_SECRET_NAME}
        hosts:
          - alertmanager.${DOMAIN}

grafana:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.${DOMAIN}
    tls:
      - secretName: ${TLS_SECRET_NAME}
        hosts:
          - grafana.${DOMAIN}
  
  grafana.ini:
    server:
      root_url: https://grafana.${DOMAIN}
    auth.generic_oauth:
      enabled: true
      name: Keycloak
      allow_sign_up: true
      client_id: grafana
      scopes: openid email profile groups
      # auth_url is browser-facing (external HTTPS)
      auth_url: https://keycloak.${DOMAIN}/realms/devops/protocol/openid-connect/auth
      # token_url and api_url are server-side (internal HTTP, bypasses .localhost DNS issue)
      token_url: http://keycloak-keycloakx-http.keycloak.svc.cluster.local/realms/devops/protocol/openid-connect/token
      api_url: http://keycloak-keycloakx-http.keycloak.svc.cluster.local/realms/devops/protocol/openid-connect/userinfo
      role_attribute_path: contains(groups[*], 'devops-admins') && 'Admin' || contains(groups[*], 'developers') && 'Editor' || 'Viewer'

  initChownData:
    enabled: false

  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-oidc-secret
        key: client-secret
