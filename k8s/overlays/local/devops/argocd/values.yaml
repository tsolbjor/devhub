# ArgoCD local overlay values
# Merged with base/devops/argocd/values.yaml
# Uses ${DOMAIN} and ${TLS_SECRET_NAME} from config.yaml

global:
  domain: argocd.${DOMAIN}

configs:
  params:
    server.insecure: true

  cm:
    create: true
    url: https://argocd.${DOMAIN}
    oidc.config: |
      name: Keycloak
      issuer: https://keycloak.${DOMAIN}/realms/devops
      clientID: argocd
      clientSecret: $oidc.keycloak.clientSecret
      requestedScopes: ["openid", "profile", "email", "groups"]

  rbac:
    policy.csv: |
      g, devops-admins, role:admin
      g, developers, role:readonly
      g, viewers, role:readonly

  secret:
    extra:
      oidc.keycloak.clientSecret: ""

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations: {}
    extraTls:
      - secretName: ${TLS_SECRET_NAME}
        hosts:
          - argocd.${DOMAIN}
