apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tshub

resources:
  - ../../base
  - ingress.yaml
  # TLS secret and CA ConfigMap are generated by setup-ca.sh
  # - tls-secret.yaml
  # - ca-configmap.yaml

commonLabels:
  environment: local

# Patches for local development
patches: []

# ConfigMap generator for local settings
configMapGenerator:
  - name: local-config
    literals:
      - ENVIRONMENT=local
      - LOG_LEVEL=debug
      - BASE_URL=https://app.local.dev
      - API_URL=https://api.local.dev
