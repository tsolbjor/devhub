# GitLab UpCloud overlay values
# Merged with base/devops/gitlab/values.yaml
# Domain is templated - replaced by deploy script with $DOMAIN

global:
  hosts:
    domain: ${DOMAIN}
    gitlab:
      name: gitlab.${DOMAIN}
    registry:
      name: registry.${DOMAIN}
    minio:
      name: minio.${DOMAIN}

  # Override data service hosts to managed services
  psql:
    host: ${PG_HOST}
  redis:
    host: ${VALKEY_HOST}

  # Object storage connection pointing to managed S3
  appConfig:
    object_store:
      connection:
        secret: gitlab-object-storage-secret
        key: connection

  ingress:
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    configureCertmanager: false
    tls:
      enabled: true
