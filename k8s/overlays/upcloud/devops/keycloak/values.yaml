# Keycloak UpCloud overlay values
# Chart: codecentric/keycloakx
# Merged with base/devops/keycloak/values.yaml

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  rules:
    - host: keycloak.${DOMAIN}
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: keycloak-tls
      hosts:
        - keycloak.${DOMAIN}
