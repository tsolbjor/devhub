# Keycloak GCP overlay values
# Merged with base/devops/keycloak/values.yaml

# Override database hostname to point to Cloud SQL private IP
database:
  hostname: ${PG_HOST}

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  rules:
    - host: keycloak.${DOMAIN}
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: keycloak-tls
      hosts:
        - keycloak.${DOMAIN}
